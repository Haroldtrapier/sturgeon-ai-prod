name: Deploy Harpoon AI Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'Dockerfile.backend'
      - 'railway.json'
      - 'railway.toml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Check Railway Token
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "Error: RAILWAY_TOKEN secret is not set"
            echo "Please add your Railway token in GitHub Secrets"
            echo "Get your token from: https://railway.app/account/tokens"
            exit 1
          fi
          echo "Railway token is configured"

      - name: Deploy to Railway
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying Harpoon AI backend to Railway..."

          if [ -n "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
            railway up --detach --service ${{ secrets.RAILWAY_SERVICE_ID }}
          else
            railway up --detach
          fi
          echo "Deployment initiated successfully"

          echo "Fetching service domain..."
          DOMAIN=$(railway domain 2>/dev/null || echo "")
          if [ -n "$DOMAIN" ]; then
            echo "RAILWAY_DOMAIN=$DOMAIN" >> $GITHUB_OUTPUT
            echo "Detected domain: $DOMAIN"
          elif [ -n "${{ secrets.RAILWAY_DOMAIN }}" ]; then
            echo "RAILWAY_DOMAIN=${{ secrets.RAILWAY_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "Using configured domain: ${{ secrets.RAILWAY_DOMAIN }}"
          else
            echo "Warning: Could not detect Railway domain"
            echo "RAILWAY_DOMAIN=" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 60

      - name: Verify Deployment Health
        if: steps.deploy.outputs.RAILWAY_DOMAIN != ''
        run: |
          DOMAIN="${{ steps.deploy.outputs.RAILWAY_DOMAIN }}"
          echo "Checking health endpoint..."
          HEALTH_URL="https://${DOMAIN}/health"
          echo "Health URL: $HEALTH_URL"

          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            RESPONSE=$(curl -sf "$HEALTH_URL" 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check failed, retrying in 20 seconds..."
            sleep 20
          done

          echo "Health check failed after 5 attempts"
          exit 1

      - name: Skip Health Check
        if: steps.deploy.outputs.RAILWAY_DOMAIN == ''
        run: |
          echo "Skipping health check - no domain configured"
          echo "Set RAILWAY_DOMAIN secret or generate one in the Railway dashboard"

      - name: Deployment Summary
        if: always()
        run: |
          echo "=================================="
          echo "Harpoon AI Deployment Summary"
          echo "=================================="
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          DOMAIN="${{ steps.deploy.outputs.RAILWAY_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            echo "Domain: https://${DOMAIN}"
            echo "Health: https://${DOMAIN}/health"
            echo "API Docs: https://${DOMAIN}/docs"
          else
            echo "Domain: Not configured yet"
            echo "Generate one at: https://railway.app/dashboard"
          fi
          echo "=================================="
